name: Update Publications from Semantic Scholar

on:
  schedule:
    # Runs at 8:00 AM UTC on the 1st of every month
    - cron: '0 8 1 * *'
  workflow_dispatch:
    # Allows you to trigger it manually from GitHub Actions tab

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run publication update script
        env:
          SEMANTIC_SCHOLAR_ID: ${{ vars.SEMANTIC_SCHOLAR_ID }}
          PUBLICATIONS_FILE: ${{ vars.PUBLICATIONS_FILE }}
        run: |
          python scripts/update_publications.py

      - name: Commit and push if publications changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No new publications found. Nothing to commit."
          else
            git commit -m "chore: update publications from Semantic Scholar [skip ci]"
            git push
            echo "Publications updated and pushed."
          fi
